name: Build Desktop Apps

# 手动触发，或推送 v* 标签时触发（打 tag 会顺便发 Release）
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# 让 JS actions 运行在 Node 24 上（消除 Node 20 弃用警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with electron-builder
        # 不设 CSC_IDENTITY_AUTO_DISCOVERY=false，让 electron-builder 对 mac 做 ad-hoc 签名
        # （否则产出的 App 完全无签名，在 Apple 芯片上会被报「已损坏」）
        run: npx electron-builder --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
