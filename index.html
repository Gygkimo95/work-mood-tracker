<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'; connect-src 'self'" />
  <title>打工状态记录器</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <div class="popover-head" id="popoverHead">
      <span class="ph-title">🐱 此刻你是什么状态？</span>
      <button class="ph-more" id="phMore" title="打开完整视图（时间线 / 统计 / 设置）">详情</button>
    </div>
    <header class="topbar">
      <div class="brand">
        <span class="logo">🐱</span>
        <div class="brand-text">
          <h1>打工状态记录器</h1>
          <p id="todayLabel">记录此刻，了解自己</p>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="log">记录</button>
        <button class="tab" data-tab="timeline">时间线</button>
        <button class="tab" data-tab="stats">统计</button>
        <button class="tab" data-tab="settings">设置</button>
      </nav>
    </header>

    <main class="content">
      <!-- 记录页 -->
      <section class="view active" id="view-log">
        <div class="prompt-row">
          <h2>此刻，你是什么状态？</h2>
          <span class="hint">点一下即记录 · 自动带时间</span>
        </div>
        <div class="state-grid" id="stateGrid"></div>

        <div class="recent-block">
          <div class="recent-head">
            <h3>今天刚刚记的</h3>
            <span class="count-pill" id="todayCount">0 条</span>
          </div>
          <ul class="recent-list" id="recentList"></ul>
        </div>
      </section>

      <!-- 时间线页 -->
      <section class="view" id="view-timeline">
        <div class="day-nav">
          <button class="nav-btn" id="prevDay">‹</button>
          <div class="day-title">
            <h2 id="timelineDate">今天</h2>
            <span id="timelineSub" class="hint"></span>
          </div>
          <button class="nav-btn" id="nextDay">›</button>
        </div>

        <div class="band-wrap">
          <div class="band" id="dayBand"></div>
          <div class="band-axis" id="bandAxis"></div>
        </div>

        <ul class="timeline-list" id="timelineList"></ul>
      </section>

      <!-- 统计页 -->
      <section class="view" id="view-stats">
        <div class="range-switch">
          <button class="range-btn active" data-range="week">本周</button>
          <button class="range-btn" data-range="month">本月</button>
          <button class="range-btn" data-range="all">全部</button>
        </div>

        <div class="stat-cards" id="statCards"></div>

        <div class="stat-panel">
          <h3>四大类占比</h3>
          <p class="hint">看看你的时间都流向了哪里</p>
          <div class="cat-bar" id="catBar"></div>
          <div class="cat-legend" id="catLegend"></div>
        </div>

        <div class="stat-panel">
          <h3>状态热力图</h3>
          <p class="hint">星期 × 时段 · 颜色=主导类别，越深=该时段记录越多。找出黄金时段与内耗高发期</p>
          <div class="heatmap-scroll">
            <div class="heatmap" id="heatmap"></div>
          </div>
          <div class="heat-legend" id="heatLegend"></div>
        </div>

        <div class="stat-panel">
          <h3>各状态出现次数</h3>
          <div class="rank-list" id="rankList"></div>
        </div>
      </section>

      <!-- 设置页 -->
      <section class="view" id="view-settings">
        <div class="settings-head">
          <h2>自定义你的状态</h2>
          <p class="hint">增删状态词，给每个词选一个所属大类，统计会更懂你</p>
        </div>

        <form class="add-form" id="addForm" autocomplete="off">
          <div class="emoji-field">
            <button type="button" class="emoji-trigger" id="emojiTrigger" aria-haspopup="true" aria-expanded="false">
              <span class="et-emoji" id="etEmoji">🙂</span>
              <span class="et-caret">▾</span>
            </button>
            <div class="emoji-popover" id="emojiPopover" hidden></div>
          </div>
          <input type="text" id="newLabel" class="label-input" maxlength="12" placeholder="新状态名，如「会议黑洞」" />
          <select id="newCategory" class="cat-select"></select>
          <button type="submit" class="add-btn">添加</button>
        </form>

        <ul class="manage-list" id="manageList"></ul>

        <div class="danger-zone">
          <button class="ghost-btn" id="exportBtn">导出数据</button>
          <button class="ghost-btn" id="importBtn">导入数据</button>
          <input type="file" id="importFile" accept="application/json" hidden />
          <button class="ghost-btn danger" id="resetBtn">清空所有记录</button>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
